const base = "/vcpe-knowledge-base/";

    // Will use dynamic import for D3
    async function initGraph() {
      const d3 = await import('d3');

      const container = document.getElementById('graph-container');
      const svg = d3.select('#graph-svg');
      const tooltip = document.getElementById('tooltip');
      const tooltipTitle = document.getElementById('tooltip-title');
      const tooltipModule = document.getElementById('tooltip-module');
      const tooltipTags = document.getElementById('tooltip-tags');
      const resetBtn = document.getElementById('reset-btn');

      const width = container.clientWidth;
      const height = container.clientHeight;

      // Module colors
      const moduleColors = {
        '00': '#3b82f6', '01': '#10b981', '02': '#f59e0b', '03': '#ef4444',
        '04': '#8b5cf6', '05': '#ec4899', '06': '#06b6d4', '07': '#f97316',
        '08': '#14b8a6', '09': '#a855f7', '10': '#e11d48', '11': '#64748b',
      };

      // Set up dots in legend
      document.querySelectorAll('.module-dot').forEach(dot => {
        const modId = dot.dataset.module;
        dot.style.backgroundColor = moduleColors[modId] || '#64748b';
      });

      // Prepare data
      const nodes = graphData.nodes.map(n => ({
        ...n,
        radius: Math.max(5, Math.min(15, Math.sqrt(n.wordCount / 500))),
        color: moduleColors[n.module] || '#64748b',
      }));

      const nodeMap = new Map(nodes.map(n => [n.id, n]));
      const links = graphData.links
        .filter(l => nodeMap.has(l.source) && nodeMap.has(l.target))
        .map(l => ({
          source: l.source,
          target: l.target,
          strength: l.strength,
        }));

      // Create simulation
      const simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(80).strength(l => l.strength * 0.3))
        .force('charge', d3.forceManyBody().strength(-150))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => d.radius + 2));

      // Create zoom
      const zoom = d3.zoom()
        .scaleExtent([0.3, 5])
        .on('zoom', (event) => {
          g.attr('transform', event.transform);
        });

      svg.call(zoom);

      const g = svg.append('g');

      // Draw links
      const link = g.append('g')
        .selectAll('line')
        .data(links)
        .join('line')
        .attr('stroke', '#94a3b8')
        .attr('stroke-opacity', 0.3)
        .attr('stroke-width', 1);

      // Draw nodes
      const node = g.append('g')
        .selectAll('circle')
        .data(nodes)
        .join('circle')
        .attr('r', d => d.radius)
        .attr('fill', d => d.color)
        .attr('stroke', '#fff')
        .attr('stroke-width', 1.5)
        .style('cursor', 'pointer')
        .on('mouseover', (event, d) => {
          tooltipTitle.textContent = d.title;
          tooltipModule.textContent = modulesData.find(m => m.id === d.module)?.name || '';
          tooltipTags.innerHTML = d.tags.slice(0, 5).map(t => `<span class="inline-block px-1.5 py-0.5 bg-gray-100 dark:bg-primary-700 rounded">${t}</span>`).join('');
          tooltip.style.display = 'block';
          tooltip.style.left = (event.pageX + 10) + 'px';
          tooltip.style.top = (event.pageY - 10) + 'px';

          // Highlight connected
          const connectedIds = new Set();
          links.forEach(l => {
            const sid = typeof l.source === 'object' ? l.source.id : l.source;
            const tid = typeof l.target === 'object' ? l.target.id : l.target;
            if (sid === d.id) connectedIds.add(tid);
            if (tid === d.id) connectedIds.add(sid);
          });

          node.attr('opacity', n => n.id === d.id || connectedIds.has(n.id) ? 1 : 0.2);
          link.attr('stroke-opacity', l => {
            const sid = typeof l.source === 'object' ? l.source.id : l.source;
            const tid = typeof l.target === 'object' ? l.target.id : l.target;
            return sid === d.id || tid === d.id ? 0.8 : 0.05;
          });
        })
        .on('mousemove', (event) => {
          tooltip.style.left = (event.pageX + 10) + 'px';
          tooltip.style.top = (event.pageY - 10) + 'px';
        })
        .on('mouseout', () => {
          tooltip.style.display = 'none';
          node.attr('opacity', 1);
          link.attr('stroke-opacity', 0.3);
        })
        .on('click', (event, d) => {
          window.location.href = `${base}articles/${d.id}/`;
        })
        .call(d3.drag()
          .on('start', (event, d) => {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
          })
          .on('drag', (event, d) => {
            d.fx = event.x;
            d.fy = event.y;
          })
          .on('end', (event, d) => {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
          })
        );

      // Add labels for larger nodes
      const label = g.append('g')
        .selectAll('text')
        .data(nodes.filter(n => n.radius >= 8))
        .join('text')
        .text(d => d.title.length > 12 ? d.title.slice(0, 12) + '...' : d.title)
        .attr('font-size', 8)
        .attr('font-family', '"Noto Sans SC", sans-serif')
        .attr('text-anchor', 'middle')
        .attr('dy', d => d.radius + 12)
        .attr('fill', '#64748b')
        .style('pointer-events', 'none');

      // Simulation tick
      simulation.on('tick', () => {
        link
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);

        node
          .attr('cx', d => d.x)
          .attr('cy', d => d.y);

        label
          .attr('x', d => d.x)
          .attr('y', d => d.y);
      });

      // Reset button
      resetBtn?.addEventListener('click', () => {
        svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
        simulation.alpha(0.5).restart();
      });
