]] — 投决会关注什么？如何决策？\n- [[交割与工商变更]] — 投资完成后需要做哪些执行工作？\n- [[投资后首次沟通]] — 交割后第一步该做什么？\n\n---\n\n## 02-估值方法\n\n- [[Pre-Money与Post-Money]] — 融资轮次中估值如何定义？\n- [[估值谈判与博弈]] — 买卖双方如何就估值达成一致？\n- [[可比公司法]] — 市场给类似公司什么估值？\n- [[现金流折现法-DCF]] — 企业的内在价值是多少？\n- [[风险投资法]] — VC 早期投资如何定价？\n\n---\n\n## 03-法律与条款\n\n- [[优先清算权]] — 公司被卖时投资人能拿回多少？\n- [[反稀释条款]] — 后轮估值下降时如何避免损失？\n- [[对赌协议-VAM]] — 业绩不达标时如何保护投资人？\n- [[股东协议核心条款]] — SHA 里有哪些关键条款？\n- [[董事会席位与一票否决]] — 投资人如何参与公司治理？\n\n---\n\n## 04-行业赛道\n\n### 概述文件\n\n- [[SaaS与企业服务]] — SaaS 的核心指标和投资逻辑是什么？\n- [[人工智能]] — AI 的商业模式和竞争格局？\n- [[新能源与碳中和]] — 碳中和带来哪些结构性机会？\n- [[消费与零售]] — 消费升级还是消费降级？\n- [[生物科技与医疗]] — 医疗赛道的特殊性和估值方法？\n- [[金融科技]] — 金融科技的监管边界在哪？\n\n### 深度研报\n\n- [[SaaS与企业服务-深度研报]]\n- [[人工智能-深度研报]]\n- [[先进制造与机器人-深度研报]]\n- [[半导体与硬科技-深度研报]]\n- [[新能源与碳中和-深度研报]]\n- [[消费与零售-深度研报]]\n- [[生物科技与医疗-深度研报]]\n- [[金融科技-深度研报]]\n\n---\n\n## 05-尽职调查\n\n- [[财务尽调清单]] — 财务数据有哪些\"坑\"？\n- [[法律尽调清单]] — 法律风险如何排查？\n- [[商业尽调方法]] — 市场和商业模式如何验证？\n- [[技术尽调要点]] — 技术壁垒如何评估？\n- [[尽调红旗信号]] — 哪些信号应该叫停交易？\n\n---\n\n## 06-投后管理\n\n- [[董事会治理]] — 如何通过董事会参与公司治理？\n- [[KPI监控体系]] — 跟踪哪些指标判断企业健康度？\n- [[增值服务与资源对接]] — 如何帮被投企业成长？\n- [[跟投与追加投资]] — 什么时候该加注、什么时候止损？\n\n---\n\n## 07-退出策略\n\n- [[IPO路径]] — 上市的条件和流程是什么？\n- [[并购退出]] — 如何通过 M&A 实现退出？\n- [[S基金与二级交易]] — 基金份额如何提前变现？\n- [[回购条款触发]] — 什么条件下触发回购？\n\n---\n\n## 08-中国VC-PE实务\n\n- [[GP备案流程]] — GP 备案需要哪些条件和步骤？\n- [[基金备案与监管]] — 私募基金的监管框架是什么？\n- [[外资准入负面清单]] — 外资能投什么、不能投什么？\n- [[政府引导基金合作]] — 如何拿政府的钱、满足什么条件？\n- [[税务筹划要点]] — 基金和投资人的税务如何优化？\n\n---\n\n## 09-风险与组合\n\n- [[DPI与IRR解读]] — 如何正确理解基金回报指标？\n- [[分散化策略]] — 分散化能降低多少风险？\n- [[常见风险类型]] — VC/PE 面临哪些系统性和非系统性风险？\n- [[投资组合构建]] — 如何构建均衡的投资组合？\n\n---\n\n## 10-案例库\n\n### 早期成功案例（20个）\n\n- [[案例-早期-字节跳动]] — 千倍回报：技术平台型公司的早期识别\n- [[案例-早期-美团]] — 多轮跟投：从团购到本地生活超级平台\n- [[案例-早期-拼多多]] — 下沉市场："},{"id":"readme","title":"VC/PE 投资知识库 — 使用指南","excerpt":"---","slug":"readme","module":"00","moduleName":"其他","tags":[],"wordCount":2704,"created":"","updated":"","content":"# VC/PE 投资知识库 — 使用指南\n\n> 面向投资实战的系统化知识框架。每篇笔记都要回答：\"这对投资决策意味着什么？\"\n\n---\n\n## 知识库结构\n\n| 目录 | 内容 | 文件数 |\n|------|------|--------|\n| 00-基础概念 | LP/GP、基金架构、Term Sheet 等核心概念 | 5 |\n| 01-投资流程 | 从项目发现到交割的全流程 | 5 |\n| 02-估值方法 | DCF、可比公司法、风险投资法等 | 5 |\n| 03-法律与条款 | 对赌、反稀释、优先清算等核心条款 | 5 |\n| 04-行业赛道 | 6 大行业概述 + 8 份深度研报 | 14 |\n| 05-尽职调查 | 财务/法律/商业/技术四维尽调 | 5 |\n| 06-投后管理 | 董事会治理、KPI 监控、增值服务 | 4 |\n| 07-退出策略 | IPO、并购、S 基金、回购 | 4 |\n| 08-中国VC-PE实务 | 备案、监管、税务、政府引导基金 | 5 |\n| 09-风险与组合 | DPI/IRR、分散化、组合构建 | 4 |\n| 10-案例库 | 100+ 真实投资案例 | 106 |\n| 11-工具与资源 | 数据源、财务模型、推荐书单 | 3 |\n\n---\n\n## 深度研报阅读指引\n\n04-行业赛道目录下的 `深度研报/` 子目录包含 8 份行业深度研报，覆盖：\n\n- SaaS与企业服务、人工智能、先进制造与机器人、半导体与硬科技\n- 新能源与碳中和、消费与零售、生物科技与医疗、金融科技\n\n**阅读建议：**\n\n1. **先读概述，再读研报**：每份研报对应一篇行业概述文件。先读概述了解基本面，再通过研报深入产业链分析、竞争格局、估值逻辑。\n2. **结合赛道案例**：研报中的理论框架可通过赛道案例验证。例如读完 [[人工智能-深度研报]]，再看 [[案例-赛道-DeepMind]] 和 [[案例-赛道-智谱AI]]。\n3. **关注投资视角**：研报不是行业百科，重点看\"投资机会在哪\"\"风险点是什么\"\"估值怎么定\"三个问题。\n\n---\n\n## 案例库使用方法\n\n10-案例库包含 106 个真实投资案例，按五个维度分类：\n\n### 案例分类\n\n| 类型 | 数量 | 说明 |\n|------|------|------|\n| 早期成功案例 | 20 | 字节跳动、美团、拼多多等中国独角兽的早期投资复盘 |\n| 成长期成功案例 | 20 | 宁德时代、药明康德等企业从成长到上市的投资逻辑 |\n| 失败/争议案例 | 20 | OFO、瑞幸、WeWork 等失败案例的教训总结 |\n| 海外经典案例 | 20 | Facebook、Tesla、OpenAI 等全球标杆案例 |\n| 行业专题案例 | 20 | Salesforce、台积电、比亚迪等行业龙头的赛道分析 |\n\n### 案例使用方式\n\n- **对标研究**：投资某赛道时，先看该赛道的专题案例，理解行业龙头的发展路径和投资逻辑。\n- **风险警示**：失败案例是最好的老师。每个失败案例都标注了核心教训和尽调红旗信号。\n- **估值参考**：成功案例中包含融资历程和估值变化，可作为可比交易的数据来源。\n- **案例对比**：将同赛道的早期案例和成长期案例对比，观察企业从 0 到 1 再到 N 的完整路径。\n\n---\n\n## Web 应用\n\n知识库附带 Astro 构建的 Web 应用，支持在线浏览、搜索和知识图谱可视化：\n\n```bash\ncd site\n\n# 安装依赖\nnpm install\n\n# 生成内容数据（从 Markdown 文件生成 JSON）\nnode scripts/fetch-content.mjs\n\n# 启动开发服务器\nnpm run dev\n\n# 构建静态站点\nnpm run build\n```\n\n### 功能特性\n\n| 功能 | 说明 |\n|------|------|\n| 全文搜索 | Fuse.js 驱动，支持标题/内容/标签搜索，支持标签筛选 |\n| 知识图谱 | D3.js 力导向图，展示文章间的双向链接关系，支持拖拽和缩放 |\n| 模块导航 | 12 个知识模块的分类浏览 |\n| 文章渲染 | Markdown → HTML，支持 Wiki 链接、表格、Callout |\n| 目录导航 | 自动生成文章目录，滚动高亮当前位置 |\n| 相关推荐 | 基于标签和链接的相关文章推荐 |\n| 暗色主题 | 支持暗色/亮色切换，自动跟随系统偏好 |\n| 响应式设计 | 移动端自适应布局 |\n\n### 构建产物\n\n- 183 个静态 HTML 页面\n- 8.5 MB 总大小\n- 可部署到任何静态托管服务（Netlify、V"}]</script>  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>  <script>

      function performSearch(query) {
        var results;
        if (query.length > 0) {
          results = fuse.search(query).map(function(r) { return r.item; });
        } else {
          results = articlesData;
        }
        if (activeTag) {
          results = results.filter(function(r) { return r.tags.includes(activeTag); });
        }
        initialState.classList.add('hidden');
        resultsCount.classList.remove('hidden');
        countNum.textContent = results.length;
        renderResults(results);
      }

      // URL params
      var urlParams = new URLSearchParams(window.location.search);
      var queryParam = urlParams.get('q');
      var tagParam = urlParams.get('tag');
      if (queryParam) {
        searchInput.value = queryParam;
        performSearch(queryParam);
      }
      if (tagParam) {
        activeTag = tagParam;
        var tagBtn = document.querySelector('[data-tag="' + tagParam + '"]');
        if (tagBtn) tagBtn.classList.add('bg-accent-100', 'dark:bg-accent-900/30', 'border-accent-300', 'dark:border-accent-600', 'text-accent-700', 'dark:text-accent-300');
        performSearch(searchInput.value);
      }

      searchInput.addEventListener('input', function(e) {
        var q = e.target.value.trim();
        if (q.length === 0 && !activeTag) {
          resultsContainer.innerHTML = '';
          resultsCount.classList.add('hidden');
          initialState.classList.remove('hidden');
          return;
        }
        performSearch(q);
      });

      tagButtons.forEach(function(btn) {
        btn.addEventListener('click', function() {
          var tag = btn.dataset.tag;
          if (activeTag === tag) {
            activeTag = '';
            btn.classList.remove('bg-accent-100', 'dark:bg-accent-900/30', 'border-accent-300', 'dark:border-accent-600', 'text-accent-700', 'dark:text-accent-300');
          } else {
            tagButtons.forEach(function(b) { b.classList.remove('bg-accent-100', 'dark:bg-accent-900/30', 'border-accent-300', 'dark:border-accent-600', 'text-accent-700', 'dark:text-accent-300'); });
            activeTag = tag;
            btn.classList.add('bg-accent-100', 'dark:bg-accent-900/30', 'border-accent-300', 'dark:border-accent-600', 'text-accent-700', 'dark:text-accent-300');
          }
          performSearch(searchInput.value.trim());
        });
      });
    })();
